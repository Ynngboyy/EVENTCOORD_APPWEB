<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventCoord | Acceso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/gh/sitepoint-editors/jsqrcode@master/src/qr_packed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <section class="main-hero">
        <div class="overlay"></div>
        
        <div class="content-container">
            <div class="company-brand text-center mb-4">
                <img src="img/eventcord.jpg" alt="EventCoord" class="main-logo">
            </div>

            <div class="scanner-box">
                <p class="instruction">Escanea el QR de tu evento</p>
                
                <div class="interaction-area">
                    <div id="btn-scan-qr" class="qr-trigger" onclick="encenderCamara()">
                        <div class="qr-icon-wrapper">
                            <img src="https://dab1nmslvvntp.cloudfront.net/wp-content/uploads/2017/07/1499401426qr_icon.svg" alt="Icono QR">
                        </div>
                        <span class="btn-label">ACTIVAR ESCÁNER</span>
                    </div>

                    <canvas hidden id="qr-canvas"></canvas>
                    
                    <button id="btn-cerrar" class="btn-corp-danger" style="display:none;" onclick="cerrarCamara()">
                        DETENER LECTURA
                    </button>

                    <hr class="divider">
                
                    <a href="Eventcord.html" class="btn-back">
                        REGRESAR AL INICIO
                    </a>
                </div>
            </div>
        </div>
    </section>

    <audio id="audioScaner" src="assets/sonido.mp3"></audio>
    <script src="assets/js/index.js"></script>
</body>
</html>
